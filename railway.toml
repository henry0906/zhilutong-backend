[railway]
  builder = "nixpacks"
  builderVersion = "v2"
  runCommand = "node src/index.js"

[nixpacks]
  nodejs_version = "20"

[deploy]
  startCommand = "node src/index.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyAmount = 5
  readinessProbe = { command = ["node", "-e", "console.log('ready')"] }

[environment]
  NODE_ENV = "production"
